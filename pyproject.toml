# Configuration for BlackOps2

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

[tool.ruff]
line-length = 100
select = ["E", "F", "I", "UP", "B"]
ignore = []
exclude = [".venv", ".git", "__pycache__"]
